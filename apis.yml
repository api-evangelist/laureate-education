x-corporate-history:
  description: |
    Major events in Laureate Education's corporate history, captured here
    because there is no public developer surface to profile. Sources:
    Wikipedia (Laureate Education), Wikipedia (Universidad Andrés Bello),
    laureate.net, and the user-supplied brief for the May 2024 IFC /
    Sterling Capital take-private.
  events:
  - year: 1989
    event: Founded as Sylvan Learning Systems (K-12 tutoring origin).
  - year: 1998
    event: Sylvan International Universities division established by Douglas Becker.
  - year: 1999
    event: First university acquisition — Universidad Europea de Madrid (Spain) for $51M.
  - year: 2003
    event: Divested K-12 business and Sylvan name/trademark to Apollo Management.
  - year: 2004
    event: Renamed Laureate Education in May 2004; took full control of Walden University in September for $109M.
  - year: 2007
    event: Taken private by an investor group led by founder Douglas Becker.
  - year: 2010
    event: 50+ institutions across 21 countries serving ~550,000 students. Bill Clinton begins term as honorary chancellor.
  - year: 2013
    event: International Finance Corporation invests $150M in equity. Acquires Brazilian chain FMU for $412M.
  - year: 2015
    event: Ernesto Zedillo replaces Bill Clinton as Presidential Counselor. Becomes largest B Corporation; IPO filing discloses $4.7B in debt.
  - year: 2016
    event: Sold Glion and four Les Roches campuses to Eurazeo for $384.9M.
  - year: 2017
    event: IPO on NASDAQ (LAUR) at $14 on 1 February — raised $490M. Third B Corporation to go public after Etsy and Rally Software. 1M+ students across 200+ campuses in 28 countries.
  - year: 2018
    event: Divestitures begin — exits Morocco, U.S. (Kendall), China, Malaysia, Italy, Cyprus. CEO Doug Becker steps down; Eilif Serck-Hanssen becomes CEO.
  - year: 2019
    event: Exits Turkey (Istanbul Bilgi), U.S. (University of St Augustine for Health Sciences, Santa Fe University of Art and Design), Brazil (Centro Universitário do Norte), Spain (UE Madrid, Valencia, Canarias), Portugal (Universidade Europeia, IPAM), wind-down of UK programs (Liverpool, Roehampton).
  - year: 2020
    event: Sells Australia / New Zealand network to Strategic Education. Transfers Universidad Andrés Bello and the Chilean operations to Fundación Educación y Cultura on 11 September 2020. Announces sale of Walden to Adtalem for $1.48B and of Brazilian operations to Ânima Holding for $765M.
  - year: 2021
    event: Closes Brazil sale to Ânima (May), Walden sale to Adtalem (August). Returns $1.29B in cash to shareholders (October). Continuing operations now focused on Mexico and Peru — revenue $522M, ~349,000 students.
  - year: 2024
    event: Take-private transaction — investor group led by International Finance Corporation (IFC) and Sterling Capital acquires Laureate Education in May 2024; delisted from NASDAQ. Headquarters remains in Miami; Mexico and Peru institutional network preserved intact.
  - year: 2025
    event: Operates as a privately held Mexico + Peru higher-education group — five institutions, ~460,000 students across 50+ campuses (250,000+ across 30+ campuses in Mexico; 210,000+ across 20 campuses in Peru).

